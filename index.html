<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirDolomiti | Official Roblox Virtual Airline</title>
    <link rel="icon" type="image/png" href="riproviamo.png">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        /* --- STILI MODULO BENVENUTO --- */
        #welcomeOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .welcome-card {
            max-width: 500px;
            padding: 40px;
            text-align: center;
            font-family: 'Open Sans', sans-serif;
        }

        .welcome-logo { width: 220px; margin-bottom: 30px; }
        .welcome-title { color: #00727A; font-weight: 300; font-size: 28px; margin-bottom: 20px; }
        .welcome-text { color: #555; line-height: 1.6; margin-bottom: 30px; font-size: 15px; }

        .privacy-box {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            text-align: left;
            margin-bottom: 30px;
            border: 1px solid #eee;
        }

        .checkbox-container {
            display: flex;
            align-items: flex-start; gap: 12px;
            cursor: pointer; font-size: 13px; color: #333;
        }

        .btn-enter {
            background: #ccc; color: white; border: none;
            padding: 16px 50px; border-radius: 4px;
            font-weight: bold; font-size: 14px;
            text-transform: uppercase; letter-spacing: 1px;
            cursor: not-allowed; transition: 0.3s;
        }

        .btn-enter.active { background: #00727A; cursor: pointer; }
        .blur-content { filter: blur(8px); pointer-events: none; }
    </style>
</head>
<body>

    <div id="welcomeOverlay">
        <div class="welcome-card">
            <img src="Air_Dolomiti_logo.svg.png" alt="Air Dolomiti" class="welcome-logo">
            
            <h2 class="welcome-title" id="w-title"></h2>
            <p class="welcome-text" id="w-text"></p>
            
            <div class="privacy-box">
                <label class="checkbox-container">
                    <input type="checkbox" id="privacyCheck">
                    <span id="w-privacy"></span>
                </label>
            </div>
            
            <button id="enterSiteBtn" class="btn-enter" disabled></button>
            
            <p id="w-copyright" style="margin-top: 30px; font-size: 10px; color: #bbb; text-transform: uppercase; letter-spacing: 1px;"></p>
        </div>
    </div>

    <div id="mainContent" class="blur-content">
        <header class="main-header">
            <div class="container header-flex" style="display:flex; justify-content:space-between; align-items:center; padding:20px;">
                <img src="Air_Dolomiti_logo.svg.png" style="height:40px;">
                <div class="lang-box" id="lang-switch" style="cursor:pointer; font-weight:bold; border:1px solid #ccc; padding:5px 10px; border-radius:4px;">EN</div>
            </div>
        </header>
        <main style="text-align:center; padding:100px;">
            <h1>Sito Caricato / Site Loaded</h1>
        </main>
    </div>

    <script>
        // 1. DATABASE TRADUZIONI MODULO BENVENUTO
        const welcomeTranslations = {
            'it': {
                'title': 'Benvenuto a bordo',
                'text': 'Per accedere al portale ufficiale di Air Dolomiti Virtual su Roblox, conferma di aver preso visione del regolamento e dei termini di utilizzo.',
                'privacy': 'Accetto i termini della Privacy, il regolamento interno e l\'uso dei cookie tecnici per la navigazione.',
                'btn': 'Accedi al sito',
                'copyright': 'Membro del Gruppo Lufthansa - Partner virtuale di Roblox'
            },
            'en': {
                'title': 'Welcome on board',
                'text': 'To access the official Air Dolomiti Virtual portal on Roblox, please confirm you have read the regulations and terms of use.',
                'privacy': 'I accept the Privacy terms, internal regulations, and the use of technical cookies for navigation.',
                'btn': 'Enter site',
                'copyright': 'Member of Lufthansa Group - Roblox Virtual Partner'
            }
        };

        // 2. RILEVAMENTO AUTOMATICO LINGUA
        // Controlla la lingua del browser (prende le prime due lettere, es: 'it-IT' diventa 'it')
        const userLang = navigator.language || navigator.userLanguage; 
        const defaultLang = userLang.startsWith('it') ? 'it' : 'en';

        // 3. APPLICA TRADUZIONE AL CARICAMENTO
        function setupWelcome(lang) {
            const t = welcomeTranslations[lang];
            document.getElementById('w-title').innerText = t.title;
            document.getElementById('w-text').innerText = t.text;
            document.getElementById('w-privacy').innerText = t.privacy;
            document.getElementById('enterSiteBtn').innerText = t.btn;
            document.getElementById('w-copyright').innerText = t.copyright;
            document.getElementById('lang-switch').innerText = lang.toUpperCase();
        }

        setupWelcome(defaultLang);

        // 4. LOGICA TASTO ENTRA
        const welcomeOverlay = document.getElementById('welcomeOverlay');
        const mainContent = document.getElementById('mainContent');
        const privacyCheck = document.getElementById('privacyCheck');
        const enterSiteBtn = document.getElementById('enterSiteBtn');

        privacyCheck.addEventListener('change', function() {
            if (this.checked) {
                enterSiteBtn.disabled = false;
                enterSiteBtn.classList.add('active');
            } else {
                enterSiteBtn.disabled = true;
                enterSiteBtn.classList.remove('active');
            }
        });

        enterSiteBtn.addEventListener('click', function() {
            welcomeOverlay.style.opacity = '0';
            mainContent.classList.remove('blur-content');
            setTimeout(() => {
                welcomeOverlay.style.visibility = 'hidden';
            }, 800);
        });
    </script>
</body>
</html>
