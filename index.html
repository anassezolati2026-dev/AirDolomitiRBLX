<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirDolomiti Roblox | Official Virtual Airline</title>
    <meta name="description" content="Welcome to AirDolomiti Roblox, the premier virtual airline bringing Italian style to the Roblox skies.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="top-alert">
        POSSIBLE FLIGHT DISRUPTIONS DUE TO SYSTEM MAINTENANCE - CHECK YOUR STATUS
    </div>

    <header>
        <nav>
            <div class="logo">
                <img src="Air_Dolomiti_logo.svg.png" alt="AirDolomiti Roblox Logo">
            </div>
            <ul class="nav-links">
                <li><a href="#">Explore</a></li>
                <li><a href="#">Book & Manage</a></li>
                <li><a href="#">On Board</a></li>
            </ul>
            <div class="nav-icons">
                <span>🔍</span>
                <span>👤</span>
                <span class="lang-selector">EN</span>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-background"></div>
            
            <div class="booking-container">
                <div class="booking-tabs">
                    <button class="active">Round trip</button>
                    <button>One way</button>
                </div>
                <div class="booking-form">
                    <div class="input-group">
                        <label>From</label>
                        <input type="text" placeholder="Departure Airport">
                    </div>
                    <div class="input-group">
                        <label>To</label>
                        <input type="text" placeholder="Arrival Airport">
                    </div>
                    <button class="btn-search">Search Flight ✈️</button>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
