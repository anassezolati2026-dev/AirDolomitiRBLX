<!DOCTYPE html>
<html lang="it" style="font-size: 67.5%;"> <head>
    <meta charset="UTF-8">
    <title>Air Dolomiti Virtual | Roblox</title>
    <style>
        :root {
            --air-petrol: #00798A; /* Colore ufficiale estratto */
            --air-border: #E8E8E8; /* Grigio bordi originale */
        }

        body { font-family: sans-serif; margin: 0; padding: 0; }

        /* HERO SECTION CON LA TUA IMMAGINE */
        .hero {
            position: relative;
            height: 550px;
            /* SOSTITUISCI 'tuo-screenshot-roblox.jpg' CON IL NOME DEL TUO FILE */
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('image_3e5fa3.jpg'); 
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Il taglio obliquo che abbiamo visto negli screenshot */
        .hero::after {
            content: "";
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100px;
            background: white;
            clip-path: polygon(0 100%, 100% 100%, 100% 0, 0 85%);
        }

        /* WIDGET DI RICERCA */
        .search-box {
            position: relative;
            z-index: 10;
            background: white;
            padding: 30px;
            display: flex;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid var(--air-border); /* Bordo fedele all'originale */
            /* Punta a freccia sulla destra come nel sito reale */
            clip-path: polygon(0% 0%, 95% 0%, 100% 50%, 95% 100%, 0% 100%);
            padding-right: 60px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--air-border);
            padding-right: 20px;
        }

        .input-group label {
            font-size: 10px;
            font-weight: bold;
            color: var(--air-petrol);
            margin-bottom: 5px;
        }

        .btn-cerca {
            background-color: var(--air-petrol);
            color: white;
            border: none;
            padding: 10px 40px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="search-box">
            <div class="input-group">
                <label>DA (PARTENZA)</label>
                <input type="text" placeholder="Aeroporto Roblox">
            </div>
            <div class="input-group">
                <label>A (ARRIVO)</label>
                <input type="text" placeholder="Destinazione">
            </div>
            <button class="btn-cerca">CERCA</button>
        </div>
    </section>

    <footer style="padding: 40px; background: #fff; border-top: 1px solid var(--air-border);">
        <p style="color: var(--air-petrol); font-weight: bold; font-size: 11px;">MEMBRO DEL GRUPPO LUFTHANSA</p>
        <p style="font-size: 12px; color: #666; text-align: left;">
            Questo sito è una simulazione virtuale per la community di Roblox.<br>
            Non siamo affiliati alla compagnia reale Air Dolomiti S.p.A..
        </p>
    </footer>

</body>
</html>
