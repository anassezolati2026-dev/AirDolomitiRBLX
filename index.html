<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirDolomiti | Official Roblox Virtual Airline</title>
    
    <link rel="icon" type="image/png" href="riproviamo.png">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          // Inserisci qui la tua Public Key che trovi nell'account EmailJS
          emailjs.init("LA_TUA_PUBLIC_KEY");
       })();
    </script>

    <style>
        /* Stili per il Modal e il menu */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 40px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; position: relative; }
        .util-icon { cursor: pointer; margin: 0 10px; font-size: 20px; }
        .lang-box { cursor: pointer; font-weight: bold; border: 1px solid #ccc; padding: 2px 8px; border-radius: 4px; }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="container header-flex" style="display: flex; justify-content: space-between; align-items: center; padding: 20px;">
            <div class="logo-area">
                <img src="Air_Dolomiti_logo.svg.png" alt="Logo" style="height: 40px;">
            </div>
            <div class="header-utilities" style="display: flex; align-items: center;">
                <span class="util-icon">🔍</span>
                <span class="util-icon" id="userIcon">👤</span>
                <div class="lang-box" id="lang-switch">EN</div>
            </div>
        </div>
    </header>

    <main>
        <section class="offers-section" style="padding: 60px 0; background-color: #f9f9f9;">
            <div class="container" style="max-width: 1100px; margin: 0 auto; display: flex; align-items: center; gap: 50px;">
                <div style="flex: 1;">
                    <img src="Screenshot 2026-04-12 084849.png" alt="Milano Linate" style="width: 100%; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
                </div>
                <div style="flex: 1;">
                    <h2 id="offer-title" style="font-size: 32px; margin-bottom: 20px;">Discover our best offer</h2>
                    <h4 style="font-size: 20px; color: #333;">Munich - Milan Linate</h4>
                    <p style="font-size: 42px; font-weight: 700; color: #00727A; margin: 15px 0;"><span id="offer-from">From</span> 120 R$</p>
                    <p style="color: #888; letter-spacing: 1px; margin-bottom: 30px;">ONE WAY - ECONOMY LIGHT</p>
                    <button style="background-color: #00727A; color: white; border: none; padding: 15px 40px; border-radius: 4px; font-weight: bold; cursor: pointer;">Book Now</button>
                </div>
            </div>
        </section>
    </main>

    <div id="loginModal" class="modal-overlay">
        <div class="modal-content">
            <span id="closeModal" style="position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer;">&times;</span>
            <img src="Air_Dolomiti_logo.svg.png" alt="Logo" style="width: 150px; margin-bottom: 20px;">
            <h3 id="login-title">Accedi al tuo profilo</h3>
            <p id="login-subtitle" style="font-size: 14px; color: #666; margin-bottom: 20px;">Inserisci la tua email per ricevere il benvenuto a bordo.</p>
            <input type="email" id="userEmail" placeholder="esempio@email.com" style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px;">
            <button id="login-submit-btn" style="width: 100%; background: #00727A; color: white; border: none; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer;">Accedi</button>
        </div>
    </div>

    <script>
        // Configurazione EmailJS e Login
        const userIcon = document.getElementById('userIcon');
        const modal = document.getElementById('loginModal');
        const closeModal = document.getElementById('closeModal');
        const loginBtn = document.getElementById('login-submit-btn');
        const emailInput = document.getElementById('userEmail');

        userIcon.onclick = () => modal.style.display = 'flex';
        closeModal.onclick = () => modal.style.display = 'none';
        window.onclick = (e) => { if (e.target == modal) modal.style.display = 'none'; };

        loginBtn.addEventListener('click', function() {
            const email = emailInput.value;
            if (email.includes('@')) {
                loginBtn.innerText = "Invio in corso...";
                loginBtn.disabled = true;

                // Parametri per EmailJS (devono corrispondere ai tag nel tuo template EmailJS)
                const templateParams = {
                    user_email: email,
                    message: "Benvenuto in Air Dolomiti Virtual Airline! Siamo felici di averti a bordo per le nostre operazioni su Roblox."
                };

                // Invia l'email tramite il tuo Service ID e Template ID
                emailjs.send('IL_TUO_SERVICE_ID', 'IL_TUO_TEMPLATE_ID', templateParams)
                    .then(function() {
                        alert("Benvenuto! Controlla la tua email.");
                        modal.style.display = 'none';
                        userIcon.innerHTML = "✅";
                        loginBtn.disabled = false;
                        loginBtn.innerText = "Accedi";
                    }, function(error) {
                        alert("Errore nell'invio. Verifica la configurazione di EmailJS.");
                        loginBtn.disabled = false;
                        loginBtn.innerText = "Accedi";
                    });
            } else {
                alert("Inserisci un indirizzo email valido.");
            }
        });

        // Cambio Lingua Semplice
        const langBtn = document.getElementById('lang-switch');
        langBtn.onclick = () => {
            const isEn = langBtn.innerText === 'EN';
            langBtn.innerText = isEn ? 'IT' : 'EN';
            document.getElementById('offer-title').innerText = isEn ? 'Scopri la nostra offerta' : 'Discover our best offer';
            document.getElementById('login-title').innerText = isEn ? 'Accedi al profilo' : 'Access your profile';
        };
    </script>
</body>
</html>
