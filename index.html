<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirDolomiti Roblox</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="header-container">
            <img src="Air_Dolomiti_logo.svg.png" class="logo">
            <nav>
                <ul class="nav-links">
                    <li><a href="#">Explore</a></li>
                    <li><a href="#">Book</a></li>
                    <li><a href="#">Fly</a></li>
                </ul>
            </nav>
            <div class="nav-icons">🔍 👤 EN</div>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-bg" style="background-image: url('Screenshot 2026-04-09 210801.png');"></div>
            
            <div class="booking-box">
                <div class="tabs">
                    <span class="active">Round Trip</span>
                    <span>One Way</span>
                </div>
                <div class="inputs">
                    <input type="text" placeholder="From">
                    <input type="text" placeholder="To">
                    <button class="btn-search">Search ➔</button>
                </div>
            </div>
        </section>

        <section class="action-bar">
            <button>Check-in</button>
            <button>Manage</button>
            <button>Status</button>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <img src="Air_Dolomiti_logo.svg.png" class="logo-small">
            <div class="socials">📘 📸 🐦</div>
        </div>
    </footer>

</body>
</html>
